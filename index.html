<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exotic Wheels - Venda de Carros</title>
    <style>
        /* Estilos Gerais */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0b0c10;
            color: #c5c6c7;
        }

        header {
            background: linear-gradient(135deg, #1f2833 0%, #0b0c10 100%);
            color: #fff;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 3px solid #66fcf1;
        }

        header h1 {
            font-size: 3rem;
            letter-spacing: 4px;
            margin-bottom: 5px;
            color: #66fcf1;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
        }

        header p {
            color: #45f3ff;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 2px;
        }

        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        /* Painel de Cadastro */
        .painel-cadastro {
            background-color: #1f2833;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            margin-bottom: 50px;
            border: 1px solid #45f3ff;
        }

        .painel-cadastro h3 {
            margin-bottom: 20px;
            color: #66fcf1;
            font-size: 1.4rem;
            text-transform: uppercase;
            border-bottom: 2px solid #45f3ff;
            padding-bottom: 10px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            align-items: flex-end;
        }

        .form-grupo {
            display: flex;
            flex-direction: column;
        }

        .form-grupo label {
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 8px;
            color: #45f3ff;
            text-transform: uppercase;
        }

        .form-grupo input, .form-grupo select, .form-grupo textarea {
            padding: 12px;
            background-color: #0b0c10;
            border: 1px solid #45f3ff;
            border-radius: 6px;
            font-size: 0.95rem;
            color: #fff;
            transition: all 0.3s;
        }

        .form-grupo input:focus, .form-grupo select:focus, .form-grupo textarea:focus {
            outline: none;
            box-shadow: 0 0 8px #66fcf1;
            border-color: #66fcf1;
        }

        .btn-adicionar {
            background: linear-gradient(90deg, #45f3ff, #66fcf1);
            color: #0b0c10;
            border: none;
            padding: 14px;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-adicionar:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 252, 241, 0.4);
        }

        .titulo-secao {
            text-align: center;
            margin-bottom: 40px;
            font-size: 2.2rem;
            color: #fff;
            letter-spacing: 1px;
        }

        /* Vitrine de Carros */
        .vitrine {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .carro-card {
            background-color: #1f2833;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.3);
            transition: transform 0.3s, border-color 0.3s;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
        }

        .carro-card:hover {
            transform: translateY(-8px);
            border-color: #66fcf1;
        }

        /* AJUSTE COMPLETO DA IMAGEM */
        .container-img {
            width: 100%;
            aspect-ratio: 16 / 9; /* Mantém tamanho padrão de tela cheia */
            background-color: #050508;
            overflow: hidden;
        }

        .carro-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Faz a foto cobrir o espaço inteiro sem distorcer o carro */
            object-position: center; /* Mantém o foco no meio da imagem */
            display: block;
        }

        .carro-info {
            padding: 25px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .carro-nome {
            font-size: 1.4rem;
            margin-bottom: 12px;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .carro-detalhes {
            font-size: 0.9rem;
            color: #c5c6c7;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            background: #0b0c10;
            padding: 8px 12px;
            border-radius: 6px;
        }

        .carro-preco {
            font-size: 1.7rem;
            color: #66fcf1;
            font-weight: bold;
            margin-bottom: 20px;
            margin-top: auto;
        }

        .btn-comprar {
            display: block;
            width: 100%;
            text-align: center;
            background-color: transparent;
            color: #45f3ff;
            border: 2px solid #45f3ff;
            padding: 12px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 6px;
            transition: all 0.3s;
            text-transform: uppercase;
            cursor: pointer;
        }

        .btn-comprar:hover {
            background-color: #45f3ff;
            color: #0b0c10;
        }

        /* Modal de Detalhes */
        .modal {
            display: none; 
            position: fixed; 
            z-index: 1000; 
            left: 0;
            top: 0;
            width: 100%; 
            height: 100%; 
            background-color: rgba(0,0,0,0.85);
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-conteudo {
            background-color: #1f2833;
            border: 2px solid #66fcf1;
            padding: 30px;
            border-radius: 12px;
            max-width: 600px;
            width: 100%;
            position: relative;
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.3);
        }

        .fechar-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            color: #45f3ff;
            font-size: 30px;
            font-weight: bold;
            cursor: pointer;
        }

        .fechar-modal:hover {
            color: #fff;
        }

        .modal-img-container {
            width: 100%;
            aspect-ratio: 16 / 9;
            background-color: #0b0c10;
            margin-bottom: 20px;
            border-radius: 6px;
            overflow: hidden;
        }

        .modal-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center;
        }

        .modal-titulo {
            color: #fff;
            font-size: 1.8rem;
            margin-bottom: 15px;
        }

        .modal-descricao {
            line-height: 1.6;
            margin-bottom: 20px;
            color: #c5c6c7;
            max-height: 120px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .btn-reset {
            background: none;
            border: 1px solid #ff4d4d;
            color: #ff4d4d;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn-reset:hover {
            background: #ff4d4d;
            color: #fff;
        }

        footer {
            background-color: #1f2833;
            color: #c5c6c7;
            text-align: center;
            padding: 25px;
            margin-top: 60px;
            font-size: 0.9rem;
            border-top: 1px solid #45f3ff;
        }
    </style>
</head>
<body>

    <header>
        <h1>EXOTIC WHEELS</h1>
        <p>Hypercars & Supercars Performance</p>
    </header>

    <div class="container">
        
        <div class="painel-cadastro">
            <h3>Gerenciador de Estoque Interno</h3>
            <div class="form-grid">
                <div class="form-grupo">
                    <label for="nome">Modelo do Carro:</label>
                    <input type="text" id="nome" placeholder="Ex: Porsche 911 GT3 RS">
                </div>
                <div class="form-grupo">
                    <label for="ano">Ano Fabricação:</label>
                    <input type="number" id="ano" placeholder="Ex: 2025">
                </div>
                <div class="form-grupo">
                    <label for="km">Quilometragem:</label>
                    <input type="text" id="km" placeholder="Ex: 1.200 ou 0KM">
                </div>
                <div class="form-grupo">
                    <label for="cambio">Tipo de Câmbio:</label>
                    <select id="cambio">
                        <option value="Automático">Automático</option>
                        <option value="Manual">Manual</option>
                        <option value="Sequencial">Sequencial</option>
                    </select>
                </div>
                <div class="form-grupo">
                    <label for="preco">Preço Final (R$):</label>
                    <input type="text" id="preco" placeholder="Ex: 1.850.000">
                </div>
                <div class="form-grupo">
                    <label for="imagem">Link da Imagem (URL):</label>
                    <input type="url" id="imagem" placeholder="https://exemplo.com/foto.jpg">
                </div>
            </div>
            
            <div class="form-grupo" style="margin-top: 20px;">
                <label for="descricao">Especificações Técnicas / Detalhes do Carro:</label>
                <textarea id="descricao" rows="3" placeholder="Descreva os opcionais, motorização..."></textarea>
            </div>
            <button class="btn-adicionar" style="margin-top: 20px; width: 100%;" onclick="adicionarCarro()">Cadastrar Veículo no Banco</button>
        </div>

        <h2 class="titulo-secao">Hypercars em Destaque</h2>
        
        <div class="vitrine" id="vitrine-carros"></div>

        <button class="btn-reset" onclick="limparEstoque()">Limpar Todo o Estoque Salvo</button>
    </div>

    <div id="modalDetalhes" class="modal">
        <div class="modal-conteudo">
            <span class="fechar-modal" onclick="fecharModal()">&times;</span>
            <div class="modal-img-container">
                <img id="modalImg" src="" alt="" class="modal-img">
            </div>
            <h3 id="modalTitulo" class="modal-titulo"></h3>
            <div id="modalSpecs" class="carro-detalhes"></div>
            <h4 id="modalPreco" class="carro-preco"></h4>
            <p id="modalDescricao" class="modal-descricao"></p>
            <button class="btn-adicionar" style="width: 100%;" onclick="alert('Proposta enviada!')">Iniciar Negociação</button>
        </div>
    </div>

    <footer>
        <p>&copy; 2026 Exotic Wheels. Dados persistentes.</p>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", carregarEstoque);

        function adicionarCarro() {
            const nome = document.getElementById('nome').value;
            const ano = document.getElementById('ano').value;
            const km = document.getElementById('km').value;
            const cambio = document.getElementById('cambio').value;
            const preco = document.getElementById('preco').value;
            let imagem = document.getElementById('imagem').value;
            const descricao = document.getElementById('descricao').value || "Nenhuma especificação fornecida.";

            if (!nome || !ano || !km || !preco) {
                alert("Preencha os campos principais.");
                return;
            }

            if (!imagem) {
                imagem = "https://images.unsplash.com/photo-1617814076367-b759c7d7e738?auto=format&fit=crop&w=600&q=80";
            }

            const novoCarro = { nome, ano, km, cambio, preco, imagem, descricao };

            let estoque = JSON.parse(localStorage.getItem('exotic_wheels_estoque')) || [];
            estoque.push(novoCarro);
            localStorage.setItem('exotic_wheels_estoque', JSON.stringify(estoque));

            renderizarCarro(novoCarro);

            document.getElementById('nome').value = '';
            document.getElementById('ano').value = '';
            document.getElementById('km').value = '';
            document.getElementById('preco').value = '';
            document.getElementById('imagem').value = '';
            document.getElementById('descricao').value = '';
        }

        function renderizarCarro(carro) {
            const vitrine = document.getElementById('vitrine-carros');
            const card = document.createElement('div');
            card.className = 'carro-card';
            
            const carroDadosString = btoa(unescape(encodeURIComponent(JSON.stringify(carro))));

            card.innerHTML = `
                <div class="container-img">
                    <img src="${carro.imagem}" alt="${carro.nome}" class="carro-img" onerror="this.src='https://images.unsplash.com/photo-1617814076367-b759c7d7e738?auto=format&fit=crop&w=600&q=80'">
                </div>
                <div class="carro-info">
                    <h3 class="carro-nome">${carro.nome}</h3>
                    <div class="carro-detalhes">
                        <span>Ano: ${carro.ano}</span>
                        <span>KM: ${carro.km}</span>
                        <span>${carro.cambio}</span>
                    </div>
                    <div class="carro-preco">R$ ${carro.preco}</div>
                    <button class="btn-comprar" onclick="abrirDetalhes('${carroDadosString}')">Ver Detalhes</button>
                </div>
            `;
            vitrine.appendChild(card);
        }

        function carregarEstoque() {
            let estoque = JSON.parse(localStorage.getItem('exotic_wheels_estoque')) || [];
            
            if (estoque.length === 0) {
                estoque = [{
                    nome: "Ferrari F8 Tributo",
                    ano: "2024",
                    km: "2.100",
                    cambio: "Automático",
                    preco: "3.900.000",
                    imagem: "https://images.unsplash.com/photo-1583121274602-3e2820c69888?auto=format&fit=crop&w=600&q=80",
                    descricao: "Motor 3.9 V8 Twin-Turbo de 720 cv. Vai de 0 a 100 km/h em apenas 2.9 segundos."
                }];
                localStorage.setItem('exotic_wheels_estoque', JSON.stringify(estoque));
            }
            
            estoque.forEach(carro => renderizarCarro(carro));
        }

        function abrirDetalhes(carroCriptografado) {
            const carroDados = JSON.parse(decodeURIComponent(escape(atob(carroCriptografado))));
            
            document.getElementById('modalImg').src = carroDados.imagem;
            document.getElementById('modalTitulo').innerText = carroDados.nome;
            document.getElementById('modalPreco').innerText = "R$ " + carroDados.preco;
            document.getElementById('modalDescricao').innerText = carroDados.descricao;
            document.getElementById('modalSpecs').innerHTML = `
                <span>Ano: ${carroDados.ano}</span>
                <span>KM: ${carroDados.km}</span>
                <span>Câmbio: ${carroDados.cambio}</span>
            `;

            document.getElementById('modalDetalhes').style.display = 'flex';
        }

        function fecharModal() {
            document.getElementById('modalDetalhes').style.display = 'none';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('modalDetalhes');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        function limparEstoque() {
            if(confirm("Deseja apagar os carros cadastrados?")) {
                localStorage.removeItem('exotic_wheels_estoque');
                location.reload();
            }
        }
    </script>
</body>
</html>
